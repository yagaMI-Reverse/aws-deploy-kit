# Reverse proxy: FastAPI app at /, self-hosted n8n at /n8n/.
# Also embedded in cloud-init.yaml — kept here standalone for reference/edits.
# After editing on the box: `sudo nginx -t && sudo systemctl reload nginx`.
server {
  listen 80 default_server;
  server_name _;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # No trailing slash — preserve the /n8n/ prefix to match N8N_PATH=/n8n/.
  location /n8n/ {
    proxy_pass http://127.0.0.1:5678;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
